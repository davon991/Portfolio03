run:
  results_dir: results/runs
  latest_symlink_name: latest
  code_commit: local

data:
  source: synthetic
  raw_prices_path: data/raw/etf_prices_wide.csv
  start: "2016-01-01"
  end: "2024-12-31"
  tickers: [SPY, VEA, EEM, IEF, TLT, TIP, LQD, VNQ, GLD, DBC]
  categories:
    SPY: equity_us
    VEA: equity_dev_ex_us
    EEM: equity_em
    IEF: rates_intermediate
    TLT: rates_long
    TIP: inflation
    LQD: credit_ig
    VNQ: real_estate
    GLD: gold
    DBC: commodities
  synthetic_seed: 20260416
  use_log_returns: false

experiment:
  strategies: [EW, GMV, ERC, CTB_ONLY, RB_CTB_BAND]
  rebalance: monthly
  window_L: 756
  x_max: 0.35
  cost_c: 0.0005
  train_frac: 0.50
  val_frac: 0.25

risk:
  method: ledoit_wolf
  min_periods: 252

model:
  budget_type: equal
  delta_band: 0.015
  eta_smooth: 2.0
  gamma_l2: 1.0e-5
  rho_penalty: 100.0

solver:
  max_iter_pg: 150
  max_iter_newton: 40
  tol_grad: 1.0e-6
  tol_obj: 1.0e-10
  tol_feas: 1.0e-10
  tol_kkt: 1.0e-6
  switch_grad_norm: 5.0e-3
  step_init: 1.0
  step_decay: 0.5
  min_step: 1.0e-8
  newton_damping_init: 1.0e-6
  newton_damping_mult: 10.0
  max_damping: 1.0e6
  fd_eps: 1.0e-5
  fallback_to_pg: true
  store_trace: true

reporting:
  make_figures: true